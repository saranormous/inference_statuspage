name: Synthetic Probe

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

concurrency:
  group: probe
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      FIREWORKS_API_KEY: ${{ secrets.FIREWORKS_API_KEY }}
      TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
      BASETEN_API_KEY: ${{ secrets.BASETEN_API_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Checkout data branch
        uses: actions/checkout@v4
        with:
          ref: data
          path: data-branch

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r monitor/requirements.txt

      - name: Run probe
        run: |
          # Point output at the data branch directory
          mkdir -p data-branch/parsed
          PROBE_OUTPUT=data-branch/parsed/probe_results.jsonl python monitor/probe.py

      - name: Commit results to data branch
        run: |
          cd data-branch
          git config user.name "probe-bot"
          git config user.email "probe-bot@users.noreply.github.com"
          git add parsed/probe_results.jsonl
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "probe: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          # Retry push up to 3 times in case of concurrent push conflicts
          for attempt in 1 2 3; do
            git push && break
            echo "Push failed (attempt $attempt), rebasing and retrying..."
            git pull --rebase
          done
